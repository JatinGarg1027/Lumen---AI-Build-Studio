<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a14" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fbfaf7" media="(prefers-color-scheme: light)" />

    <title>Lumen — AI Build Studio</title>
    <meta name="description" content="Lumen is an AI build studio for shipping apps fast. Chat to generate, preview, and deploy production-ready projects." />
    <meta name="author" content="Lumen" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Inline-SVG favicon: aurora gradient prism -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%235b6cff'/%3E%3Cstop offset='55%25' stop-color='%23b766f1'/%3E%3Cstop offset='100%25' stop-color='%23ff7849'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M9 22 L16 8 L23 22 Z' fill='none' stroke='white' stroke-width='2' stroke-linejoin='round'/%3E%3Ccircle cx='16' cy='17' r='2' fill='white'/%3E%3C/svg%3E"
    />

    <meta property="og:title" content="Lumen — AI Build Studio" />
    <meta property="og:description" content="Chat with AI to build, preview, and ship apps in minutes." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lumen — AI Build Studio" />
    <meta name="twitter:description" content="Chat with AI to build, preview, and ship apps in minutes." />

    <!-- Prevent flash of unstyled theme -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("lumen-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = stored || (prefersDark ? "dark" : "light");
          if (theme === "dark") document.documentElement.classList.add("dark");
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
