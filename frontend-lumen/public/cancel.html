<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Canceled | Project Companion</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #0b0f19;
      color: #f3f4f6;
    }
  </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-center p-4">
  <div class="max-w-md w-full bg-slate-900/60 backdrop-blur-xl border border-slate-800 p-8 rounded-3xl text-center shadow-2xl relative overflow-hidden">
    <!-- Glowing background accents -->
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-amber-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-rose-500/10 rounded-full blur-3xl"></div>

    <div class="flex justify-center mb-6">
      <div class="w-20 h-20 bg-rose-500/10 border border-rose-500/30 rounded-full flex items-center justify-center text-rose-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
        </svg>
      </div>
    </div>

    <h1 class="text-2xl font-bold bg-gradient-to-r from-rose-400 to-amber-300 bg-clip-text text-transparent mb-3">
      Checkout Canceled
    </h1>
    
    <p class="text-slate-400 text-sm mb-6 leading-relaxed">
      Your Stripe payment checkout session was canceled, and no charges were made to your account. Feel free to upgrade at any time.
    </p>

    <div class="p-4 bg-slate-800/40 border border-slate-800 rounded-xl mb-6 text-left">
      <div class="flex items-center justify-between text-xs">
        <span class="text-slate-500 font-medium">Checkout Status</span>
        <span class="text-rose-400 font-bold uppercase tracking-wider">Canceled</span>
      </div>
    </div>

    <div class="flex flex-col gap-3">
      <a href="/projects" class="inline-flex items-center justify-center w-full bg-slate-800 hover:bg-slate-750 border border-slate-700 text-slate-200 font-semibold text-sm py-3 px-6 rounded-xl transition-all duration-200 active:scale-[0.98]">
        Return to Dashboard
      </a>
    </div>
  </div>
</body>
</html>
