<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Success | Project Companion</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #0b0f19;
      color: #f3f4f6;
    }
    .checkmark-circle {
      stroke-dasharray: 166;
      stroke-dashoffset: 166;
      stroke-width: 2;
      stroke-miterlimit: 10;
      stroke: #10b981;
      fill: none;
      animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
    }
    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: block;
      stroke-width: 2;
      stroke: #fff;
      stroke-miterlimit: 10;
      box-shadow: inset 0px 0px 0px #10b981;
      animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s forwards;
    }
    .checkmark-check {
      transform-origin: 50% 50%;
      stroke-dasharray: 48;
      stroke-dashoffset: 48;
      animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
    }
    @keyframes stroke {
      100% { stroke-dashoffset: 0; }
    }
    @keyframes scale {
      0%, 100% { transform: none; }
      50% { transform: scale3d(1.1, 1.1, 1); }
    }
    @keyframes fill {
      100% { box-shadow: inset 0px 0px 0px 40px #10b981; }
    }
  </style>
</head>
<body class="font-sans min-h-screen flex flex-col items-center justify-center p-4">
  <div class="max-w-md w-full bg-slate-900/60 backdrop-blur-xl border border-slate-800 p-8 rounded-3xl text-center shadow-2xl relative overflow-hidden">
    <!-- Glowing background accents -->
    <div class="absolute -top-24 -left-24 w-48 h-48 bg-emerald-500/10 rounded-full blur-3xl"></div>
    <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-blue-500/10 rounded-full blur-3xl"></div>

    <div class="flex justify-center mb-6">
      <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
      </svg>
    </div>

    <h1 class="text-2xl font-bold bg-gradient-to-r from-emerald-400 to-teal-300 bg-clip-text text-transparent mb-3">
      Subscription Activated!
    </h1>
    
    <p class="text-slate-400 text-sm mb-6 leading-relaxed">
      Thank you for upgrading! Your premium token limits and projects capacity have been successfully activated on your account.
    </p>

    <div class="p-4 bg-slate-800/40 border border-slate-800 rounded-xl mb-6 text-left">
      <div class="flex items-center justify-between text-xs mb-1.5">
        <span class="text-slate-500 font-medium">Checkout Status</span>
        <span class="text-emerald-400 font-bold uppercase tracking-wider">Completed</span>
      </div>
      <div class="flex items-center justify-between text-xs">
        <span class="text-slate-500 font-medium">Redirection</span>
        <span class="text-slate-300 font-medium" id="countdown-text">Returning in 5s...</span>
      </div>
    </div>

    <a href="/projects" class="inline-flex items-center justify-center w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-semibold text-sm py-3 px-6 rounded-xl transition-all duration-200 shadow-lg shadow-emerald-500/15 hover:shadow-emerald-500/25 active:scale-[0.98]">
      Go to Dashboard Now
    </a>
  </div>

  <script>
    let secondsLeft = 5;
    const textEl = document.getElementById('countdown-text');
    
    const interval = setInterval(() => {
      secondsLeft--;
      if (secondsLeft <= 0) {
        clearInterval(interval);
        window.location.href = '/projects';
      } else {
        textEl.textContent = `Returning in ${secondsLeft}s...`;
      }
    }, 1000);
  </script>
</body>
</html>
