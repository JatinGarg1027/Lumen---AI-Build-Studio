spring:
  application:
    name: config-service

  cloud:
    config:
      server:
        git:
          uri: git@github.com:JatinGarg1027/lovable-ai-config-server.git
          ignore-local-ssh-settings: false
          default-label: main
        overrides:
          spring.kafka.consumer.properties.spring.json.trusted.packages: "com.distributed_lovable.*,com.codingshuttle.distributed_lovable.*"
          logging.level.org.springframework.ai: "DEBUG"
          logging.level.org.springframework.web: "DEBUG"

server:
  port: 8888

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

management:
  endpoints:
    web:
      exposure:
        include: health,info

  health:
    config:
      enabled: false

---

spring:
  config:
    activate:
      on-profile: k8s

  cloud:
    discovery:
      enabled: false

    config:
      server:
        git:
          uri: https://github.com/JatinGarg1027/lovable-ai-config-server/
          username: ${GIT_USERNAME}
          password: ${GIT_PASSWORD}

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false